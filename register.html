<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - TechShop</title>
    <link href="assets/css/bootstrap.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanuman:wght@100;300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/auth-cart.css" />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Hanuman", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }
      .register-container {
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        padding: 40px;
        max-width: 400px;
        width: 100%;
      }
      .register-container h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
        font-weight: 700;
      }
      .form-control {
        border-radius: 5px;
        border: 1px solid #ddd;
        padding: 10px;
        margin-bottom: 15px;
      }
      .btn-register {
        background: #667eea;
        border: none;
        border-radius: 5px;
        padding: 12px;
        width: 100%;
        color: white;
        font-weight: 600;
        transition: background 0.3s ease;
      }
      .btn-register:hover {
        background: #667eea;
      }
      .login-link {
        text-align: center;
        margin-top: 20px;
      }
      .login-link a {
        color: #667eea;
        text-decoration: none;
      }
      .login-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <h2>Register</h2>
      <form id="registerForm">
        <input
          type="text"
          id="username"
          class="form-control"
          placeholder="Username"
          required
        />
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="Email"
          required
        />
        <input
          type="password"
          id="password"
          class="form-control"
          placeholder="Password"
          required
        />
        <button type="submit" class="btn btn-register">Register</button>
      </form>
      <div class="login-link">
        <p>Already have an account? <a href="login.html">Login here</a></p>
      </div>
    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth-cart.js"></script>
    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const username = document.getElementById("username").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const res = registerUser(username, email, password);
          if (res.ok) {
            alert("Registration successful! Please login.");
            window.location.href = "login.html";
          } else {
            alert(res.msg);
          }
        });
    </script>
  </body>
</html>
