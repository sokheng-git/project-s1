<!DOCTYPE html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <title>Contact Us</title>

    <!-- Bootstrap CSS -->
    <link href="assets/css/bootstrap.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Hanuman:wght@100;300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/auth-cart.css" />

    <style>
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .contact-box {
        background: #fff;
        border-radius: 6px;
      }
      .captcha-box {
        display: flex;
        align-items: center;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark position-sticky top-0 z-3"
    >
      <div class="container">
        <a class="navbar-brand" href="index.html">TechShop</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="products.html">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="cart.html">Cart</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <div class="row g-4">
        <!-- LEFT: CONTACT FORM -->
        <div class="col-lg-8">
          <div class="contact-box p-4 shadow-sm">
            <h4 class="fw-bold mb-4">សូមបំពេញព័ត៌មាន</h4>

            <form id="contactForm">
              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">ឈ្មោះ*</label>
                  <input
                    type="text"
                    id="firstName"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">នាមត្រកូល*</label>
                  <input
                    type="text"
                    id="lastName"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">អ៊ីមែល*</label>
                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">លេខទូរស័ព្ទ*</label>
                  <input type="tel" id="phone" class="form-control" required />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">សារ*</label>
                <textarea
                  rows="5"
                  id="message"
                  class="form-control"
                  required
                ></textarea>
              </div>

              <!-- Fake reCAPTCHA UI -->
              <div class="mb-4">
                <div class="captcha-box">
                  <input type="checkbox" id="notRobot" />
                  <label for="notRobot" class="mb-0">I'm not AI</label>
                </div>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-dark px-4">ផ្ញើសារ</button>
                <button
                  type="button"
                  id="clearBtn"
                  class="btn btn-outline-secondary"
                >
                  សម្អាត
                </button>
              </div>

              <div id="feedback" class="mt-3" style="display: none"></div>
            </form>
          </div>
        </div>

        <!-- RIGHT: CONTACT INFO -->
        <div class="col-lg-4">
          <div class="info-box p-4 shadow-sm">
            <div class="info-item mb-4">
              <div class="icon-box"></div>
              <div>
                <small class="text-muted">ទំនាក់ទំនង:</small>
                <p class="mb-0 fw-bold">0886855271</p>
              </div>
            </div>

            <div class="info-item mb-4">
              <div class="icon-box"></div>
              <div>
                <small class="text-muted">អ៊ីមែល:</small>
                <p class="mb-0 text-primary">techshopoffice@gmail.com</p>
              </div>
            </div>

            <div class="info-item">
              <div class="icon-box"></div>
              <div>
                <small class="text-muted">អាសយដ្ឋាន:</small>
                <p class="mb-0">
                  ផ្លូវលេខ​១០៩ សង្កាត់មនោរម្យ ខណ្ឌ៧មករា រាជធានីភ្នំពេញ
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer kept out if you already have one elsewhere -->

    <!-- Bootstrap JS -->
    <script src="assets/js/bootstrap.bundle.min.js"></script>

    <script>
      // Replace with your Telegram username (without @)
      const TELEGRAM_USERNAME = "YourTelegramUsername"; // e.g. Thanun_Huon

      const form = document.getElementById("contactForm");
      const feedback = document.getElementById("feedback");
      const clearBtn = document.getElementById("clearBtn");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        // Read values
        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const message = document.getElementById("message").value.trim();
        const notRobot = document.getElementById("notRobot").checked;

        // Basic validation
        if (!firstName || !lastName || !email || !phone || !message) {
          alert("សូមបំពេញទិន្នន័យដែលមាន * ទាំងអស់។");
          return;
        }

        if (!notRobot) {
          alert("សូមបញ្ជាក់ថាអ្នកមិនមែន AI។");
          return;
        }

        // Build message (use encodeURIComponent for safety)
        let text = "";
        text += "New contact from TechShop%0A%0A";
        text +=
          encodeURIComponent("ឈ្មោះ: ") +
          encodeURIComponent(firstName + " " + lastName) +
          "%0A";
        text +=
          encodeURIComponent("លេខទូរស័ព្ទ: ") +
          encodeURIComponent(phone) +
          "%0A";
        text +=
          encodeURIComponent("អ៊ីមែល: ") + encodeURIComponent(email) + "%0A%0A";
        text +=
          encodeURIComponent("សារ: ") + encodeURIComponent(message) + "%0A%0A";
        text += encodeURIComponent("Source: Contact Page");

        // Telegram deep link
        const telegramLink = `https://t.me/HORSOHENG?text=${text}`;

        // Redirect to Telegram (user must press Send in Telegram)
        window.location.href = telegramLink;

        // Show feedback
        feedback.style.display = "block";
        feedback.style.color = "#0f5132";
        feedback.textContent =
          "Opening Telegram with your message. Please press Send to complete.";
      });

      clearBtn.addEventListener("click", () => {
        form.reset();
        feedback.style.display = "none";
      });
    </script>
    <script src="assets/js/auth-cart.js"></script>
  </body>
</html>
