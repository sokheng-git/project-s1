<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cart</title>
    <link rel="stylesheet" href="assets/css/auth-cart.css" />

    <link href="assets/css/bootstrap.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanuman:wght@100;300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark position-sticky top-0 z-3"
    >
      <div class="container">
        <a class="navbar-brand" href="index.html">TechShop</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="products.html">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="cart.html">Cart</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>
      <div class="container my-5">
        <h2 class="text-center mb-4">Your Shopping Cart</h2>
        <div class="table-responsive">
          <table class="table table-bordered align-middle">
            <thead class="table-dark">
              <tr>
                <th scope="col">Product</th>
                <th scope="col">Price</th>
                <th scope="col">Quantity</th>
                <th scope="col">Total</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody id="cart-items">
              <!-- Cart items will be dynamically inserted here -->
            </tbody>
          </table>
        </div>
        <div class="d-flex justify-content-end">
          <h4>Total Amount: $<span id="total-amount">0.00</span></h4>
        </div>
        <div class="d-flex justify-content-end mt-3">
          <button id="checkout-btn" class="btn btn-success btn-lg">
            Checkout
          </button>
        </div>
      </div>
    </main>
    <script src="assets/js/auth-cart.js"></script>

    <script>
      // Use helper getCart/saveCart from auth-cart.js if available,
      // otherwise fallback to 'cart' key for backward compatibility.
      function readCartFallback() {
        return JSON.parse(localStorage.getItem("cart")) || [];
      }
      function writeCartFallback(cart) {
        localStorage.setItem("cart", JSON.stringify(cart));
      }

      // Try to use getCart/saveCart if defined by auth-cart.js
      const hasHelpers =
        typeof getCart === "function" && typeof saveCart === "function";

      // Load cart
      let cart = hasHelpers ? getCart() : readCartFallback();

      function renderCart() {
        const cartItemsContainer = document.getElementById("cart-items");
        const totalAmountElement = document.getElementById("total-amount");
        cartItemsContainer.innerHTML = "";
        let totalAmount = 0;

        if (!cart || cart.length === 0) {
          cartItemsContainer.innerHTML = `
        <tr>
          <td colspan="5" class="text-center">Your cart is empty.</td>
        </tr>
      `;
          totalAmountElement.textContent = "0.00";
          updateCartBadgeIfExists();
          return;
        }

        cart.forEach((item, index) => {
          const itemTotal = item.price * item.quantity;
          totalAmount += itemTotal;

          const row = document.createElement("tr");
          row.innerHTML = `
        <td>${item.name}</td>
        <td>$${Number(item.price).toFixed(2)}</td>
        <td>
          <input type="number" min="1" value="${
            item.quantity
          }" class="form-control quantity-input" data-index="${index}">
        </td>
        <td>$${itemTotal.toFixed(2)}</td>
        <td>
          <button class="btn btn-danger btn-sm remove-item-btn" data-index="${index}">Remove</button>
        </td>
      `;
          cartItemsContainer.appendChild(row);
        });

        totalAmountElement.textContent = totalAmount.toFixed(2);
        attachEventListeners();
        updateCartBadgeIfExists();
      }

      function attachEventListeners() {
        // Update quantity
        document.querySelectorAll(".quantity-input").forEach((input) => {
          input.addEventListener("change", (e) => {
            const index = Number(e.target.getAttribute("data-index"));
            const newQuantity = parseInt(e.target.value);
            if (newQuantity > 0) {
              cart[index].quantity = newQuantity;
              persistCart();
              renderCart();
            } else {
              // reset to 1 if invalid
              e.target.value = cart[index].quantity || 1;
            }
          });
        });

        // Remove item
        document.querySelectorAll(".remove-item-btn").forEach((button) => {
          button.addEventListener("click", (e) => {
            const index = Number(e.target.getAttribute("data-index"));
            cart.splice(index, 1);
            persistCart();
            renderCart();
          });
        });

        // Checkout
        const checkoutBtn = document.getElementById("checkout-btn");
        if (checkoutBtn) {
          checkoutBtn.removeEventListener("click", checkoutHandler); // safe remove if previously bound
          checkoutBtn.addEventListener("click", checkoutHandler);
        }
      }

      function persistCart() {
        if (hasHelpers) {
          saveCart(cart);
        } else {
          writeCartFallback(cart);
        }
        // update global badge if helper exists
        if (typeof updateCartBadge === "function") updateCartBadge();
      }

      function updateCartBadgeIfExists() {
        if (typeof updateCartBadge === "function") {
          updateCartBadge();
        } else {
          // fallback: update element with id cart-badge if present
          const badge = document.getElementById("cart-badge");
          if (badge) {
            const totalQty = cart.reduce((s, i) => s + (i.quantity || 0), 0);
            badge.textContent = totalQty;
          }
        }
      }

      function checkoutHandler() {
        if (!cart || cart.length === 0) {
          alert("Your cart is empty. Please add items before checking out.");
          return;
        }

        let message = "I want to checkout my order:\n\n";
        let totalAmount = 0;
        cart.forEach((item) => {
          const itemTotal = item.price * item.quantity;
          totalAmount += itemTotal;
          message += `- ${item.name} (x${item.quantity}) = $${itemTotal.toFixed(
            2
          )}\n`;
        });
        message += `\nTotal Amount: $${totalAmount.toFixed(2)}`;

        const encodedMessage = encodeURIComponent(message);

        // Use TELEGRAM username without @
        const TELEGRAM_USERNAME = "HORSOHENG"; // <-- keep without @
        const telegramLink = `https://t.me/HORSOHENG?text=${encodedMessage}`;

        // Redirect to Telegram
        window.location.href = telegramLink;
      }

      // Initial render
      document.addEventListener("DOMContentLoaded", () => {
        // If auth-cart.js is loaded after this script, refresh cart and UI
        if (!hasHelpers && typeof getCart === "function") {
          // rebind to helpers
          cart = getCart();
        }
        renderCart();
      });
    </script>
  </body>
</html>
