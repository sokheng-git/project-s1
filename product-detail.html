        },
        {
          id: 14,
          name: "BMTJ GRAMMY SINCE 2007",
          price: 17,
          image: "assets/images/BMTJ GRAMMY SINCE 2007.jpg",
        },
        {
          id: 15,
          name: "Speaker Divoom Tiivoo2 (White)",
          price: 69,
          image: "assets/images/Speaker Divoom Tiivoo2 (White).jpg",
        },
        {
          id: 16,
          name: "ឧបករណ៍បំពងសម្លេង​ SONY SES-XE200 Bluetooth",
          price: 109,
          image: "assets/images/ឧបករណ៍បំពងសម្លេង​ SONY SES-XE200 Bluetooth.jpg",
        },
        {
          id: 17,
          name: "Apple EarPods គុណភាពខ្ពស និងប្រើឌុយ USB-C",
          price: 38,
          image: "assets/images/Apple EarPods គុណភាពខ្ពស និងប្រើឌុយ USB-C.jpg",
        },
        {
          id: 18,
          name: "REMAX AMOLED WATCH30",
          price: 59,
          image: "assets/images/REMAX AMOLED WATCH30.jpg",
        },
        {
          id: 19,
          name: "Apple USB-C Charge Cable (1m)",
          price: 28,
          image: "assets/images/Apple USB-C Charge Cable (1m).jpg",
        },
        {
          id: 20,
          name: "ថ្មជំនួយទូរសព្ទទាន់សម័យ Magnetic Charger W50",
          price: 18,
          image:
            "assets/images/ថ្មជំនួយទូរសព្ទទាន់សម័យ Magnetic Charger W50.jpg",
        },
      ];

      const urlParams = new URLSearchParams(window.location.search);
      const productId = parseInt(urlParams.get("id"));
      const product = products.find((p) => p.id === productId);

      if (product) {
        document.getElementById("product-detail").innerHTML = `
        <div class="row">
          <div class="col-md-6">
            <img src="${product.image}" class="img-fluid" />
          </div>
          <div class="col-md-6">
            <h3>${product.name}</h3>
            <p class="text-primary h5">$${product.price.toFixed(2)}</p>
            <p><strong>Brand:</strong> Coteci</p>
            <p><strong>Material:</strong> សម្ភារៈ</p>
            <p><strong>Origin:</strong> ប្រទេសចិន</p>
            <button class="btn btn-primary" id="add-to-cart">Add to Cart</button>
          </div>
        </div>
      `;

        document.getElementById("add-to-cart").addEventListener("click", () => {
          let cart = JSON.parse(localStorage.getItem("cart")) || [];
          const existing = cart.find((i) => i.id === product.id);

          if (existing) {
            existing.quantity++;
          } else {
            cart.push({
              id: product.id,
              name: product.name,
              price: product.price,
              quantity: 1,
            });
          }

          localStorage.setItem("cart", JSON.stringify(cart));
          alert(product.name + " added to cart");
        });
      } else {
        document.getElementById(
          "product-detail"
        ).innerHTML = `<p>Product not found.</p>`;
      }
    </script>
