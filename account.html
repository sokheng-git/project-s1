<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account - TechShop</title>
    <link href="assets/css/bootstrap.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanuman:wght@100;300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/auth-cart.css" />
    <style>
      body {
        background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
        font-family: "Hanuman", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }
      .account-container {
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        padding: 40px;
        max-width: 500px;
        width: 100%;
      }
      .account-container h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
        font-weight: 700;
      }
      .nav-tabs .nav-link {
        border: none;
        color: #666;
        font-weight: 600;
      }
      .nav-tabs .nav-link.active {
        background: #4caf50;
        color: white;
        border-radius: 5px 5px 0 0;
      }
      .form-control {
        border-radius: 5px;
        border: 1px solid #ddd;
        padding: 10px;
        margin-bottom: 15px;
      }
      .btn-account {
        background: #4caf50;
        border: none;
        border-radius: 5px;
        padding: 12px;
        width: 100%;
        color: white;
        font-weight: 600;
        transition: background 0.3s ease;
      }
      .btn-account:hover {
        background: #45a049;
      }
      .tab-content {
        padding-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="account-container">
      <h2>Account</h2>
      <ul class="nav nav-tabs" id="accountTab" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="login-tab"
            data-bs-toggle="tab"
            data-bs-target="#login"
            type="button"
            role="tab"
            aria-controls="login"
            aria-selected="true"
          >
            Login
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="register-tab"
            data-bs-toggle="tab"
            data-bs-target="#register"
            type="button"
            role="tab"
            aria-controls="register"
            aria-selected="false"
          >
            Register
          </button>
        </li>
      </ul>
      <div class="tab-content" id="accountTabContent">
        <div
          class="tab-pane fade show active"
          id="login"
          role="tabpanel"
          aria-labelledby="login-tab"
        >
          <form id="loginForm">
            <input
              type="text"
              id="loginUsername"
              class="form-control"
              placeholder="Username"
              required
            />
            <input
              type="password"
              id="loginPassword"
              class="form-control"
              placeholder="Password"
              required
            />
            <button type="submit" class="btn btn-account">Login</button>
          </form>
          <button
            class="btn btn-outline-secondary mt-3"
            onclick="window.history.back()"
          >
            Back
          </button>
        </div>
        <div
          class="tab-pane fade"
          id="register"
          role="tabpanel"
          aria-labelledby="register-tab"
        >
          <form id="registerForm">
            <input
              type="text"
              id="registerUsername"
              class="form-control"
              placeholder="Username"
              required
            />
            <input
              type="email"
              id="registerEmail"
              class="form-control"
              placeholder="Email"
              required
            />
            <input
              type="password"
              id="registerPassword"
              class="form-control"
              placeholder="Password"
              required
            />
            <button type="submit" class="btn btn-account">Register</button>
          </form>
          <button
            class="btn btn-outline-secondary mt-3"
            onclick="window.history.back()"
          >
            Back
          </button>
        </div>
      </div>
    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth-cart.js"></script>
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const username = document.getElementById("loginUsername").value;
          const password = document.getElementById("loginPassword").value;
          const res = loginUser(username, password);
          if (res.ok) {
            alert("Login successful!");
            window.location.href = "index.html";
          } else {
            alert(res.msg);
          }
        });

      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const username = document.getElementById("registerUsername").value;
          const email = document.getElementById("registerEmail").value;
          const password = document.getElementById("registerPassword").value;
          const res = registerUser(username, email, password);
          if (res.ok) {
            alert("Registration successful! Please login.");
            // Switch to login tab
            const loginTab = new bootstrap.Tab(
              document.getElementById("login-tab")
            );
            loginTab.show();
          } else {
            alert(res.msg);
          }
        });
    </script>
  </body>
</html>
